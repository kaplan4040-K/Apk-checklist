<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>APK Checklist</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiQVBLIENoZWNrbGlzdCIsInNob3J0X25hbWUiOiJBUEsiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiI2ZmZmZmZiIsInRoZW1lX2NvbG9yIjoiIzFhMWExYSJ9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f5f5;
    --card: #fff;
    --text: #1a1a1a;
    --muted: #666;
    --border: #ddd;
    --accent: #2563eb;
    --green: #16a34a;
    --red: #dc2626;
    --orange: #ea580c;
    --radius: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding-bottom: 80px;
  }

  header {
    background: var(--text);
    color: #fff;
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 20px; font-weight: 700; }
  header p { font-size: 12px; color: #aaa; margin-top: 2px; }

  .progress-bar {
    height: 3px;
    background: #333;
    position: sticky;
    top: 60px;
    z-index: 99;
  }
  .progress-bar .fill {
    height: 100%;
    background: var(--green);
    transition: width 0.3s ease;
    width: 0%;
  }

  .vehicle-info {
    background: var(--card);
    margin: 12px;
    padding: 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .vehicle-info h2 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .field-grid.full { grid-template-columns: 1fr; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .field input, .field select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 16px;
    background: var(--bg);
    color: var(--text);
    -webkit-appearance: none;
  }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(37,99,235,0.15);
  }

  /* NL Kenteken styling */
  .kenteken-wrap {
    display: flex;
    align-items: stretch;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid #1a1a1a;
    background: #f6c700;
    height: 48px;
  }
  .kenteken-nl {
    background: #003da5;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 2px 6px 4px;
    min-width: 28px;
  }
  .kenteken-nl .nl-stars { font-size: 6px; line-height: 1; }
  .kenteken-nl .nl-code { font-size: 12px; font-weight: 700; }
  .kenteken-input {
    flex: 1;
    border: none;
    background: #f6c700;
    color: #1a1a1a;
    font-size: 22px;
    font-weight: 800;
    font-family: 'Kenteken', 'License Plate', monospace, sans-serif;
    text-align: center;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0 10px;
    outline: none;
  }
  .kenteken-input::placeholder { color: #c4a000; font-weight: 400; letter-spacing: 1px; font-size: 16px; }

  /* Vehicle card */
  .vehicle-card {
    background: var(--card);
    margin: 0 12px 12px;
    padding: 14px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: none;
  }
  .vehicle-card.show { display: block; }
  .vehicle-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .vehicle-card .vc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 16px;
    font-size: 13px;
  }
  .vehicle-card .vc-grid .vc-label { color: var(--muted); font-size: 11px; }
  .vehicle-card .vc-grid .vc-val { font-weight: 600; margin-bottom: 4px; }
  .vehicle-card .vc-loading { color: var(--muted); font-size: 13px; }
  .vehicle-card .vc-error { color: var(--red); font-size: 13px; }

  /* Summary bar */
  .summary-bar {
    margin: 0 12px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: none;
  }
  .summary-bar.show { display: block; }
  .summary-bar h3 {
    font-size: 14px; font-weight: 600; margin-bottom: 8px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
  }
  .summary-counts { display: flex; gap: 12px; flex-wrap: wrap; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .summary-counts .sc-ok { color: var(--green); }
  .summary-counts .sc-fail { color: var(--red); }
  .summary-counts .sc-na { color: var(--muted); }
  .summary-alerts { margin-top: 8px; }
  .summary-alert {
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .summary-alert.warn { background: #fef3c7; border: 1px solid #f59e0b; color: #92400e; }
  .summary-alert.danger { background: #fee2e2; border: 1px solid #ef4444; color: #991b1b; }

  .apk-verdict {
    margin: 0 12px 8px;
    padding: 14px 16px;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    display: none;
  }
  .apk-verdict.show { display: block; }
  .apk-verdict.blocked {
    background: #fee2e2;
    border: 2px solid #dc2626;
    color: #991b1b;
  }
  .apk-verdict.blocked .verdict-sub {
    font-size: 12px;
    font-weight: 400;
    margin-top: 4px;
    color: #b91c1c;
  }
  .apk-verdict.passed {
    background: #dcfce7;
    border: 2px solid #16a34a;
    color: #166534;
  }
  .apk-verdict.advisory {
    background: #fef3c7;
    border: 2px solid #f59e0b;
    color: #92400e;
  }
  .apk-verdict.advisory .verdict-sub {
    font-size: 12px;
    font-weight: 400;
    margin-top: 4px;
  }

  .check-item.blocked { opacity: 0.5; pointer-events: none; position: relative; }
  .check-item .blocked-msg {
    font-size: 11px;
    color: #991b1b;
    background: #fee2e2;
    padding: 4px 8px;
    border-radius: 4px;
    margin-left: 48px;
    margin-top: 2px;
  }

  /* Aandachtspunten blok */
  .attention-card {
    background: var(--card);
    margin: 0 12px 12px;
    padding: 14px 16px;
    border-radius: var(--radius);
    border: 1px solid #f59e0b;
    border-left: 4px solid #f59e0b;
    display: none;
  }
  .attention-card.show { display: block; }
  .attention-card h3 { font-size: 14px; font-weight: 700; color: #92400e; margin-bottom: 8px; }
  .attention-card ul { margin: 0; padding: 0 0 0 18px; font-size: 13px; color: #78350f; }
  .attention-card ul li { margin-bottom: 4px; }

  .section {
    margin: 12px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .section-header:active { background: #f0f0f0; }
  .section-header h3 {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-header .num {
    background: var(--text);
    color: #fff;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
  }
  .section-header .badge {
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .badge.pending { background: #fef3c7; color: #92400e; }
  .badge.done { background: #dcfce7; color: #166534; }
  .badge.issues { background: #fee2e2; color: #991b1b; }

  .section-header .arrow {
    transition: transform 0.2s;
    color: var(--muted);
  }
  .section.open .arrow { transform: rotate(180deg); }

  .section-body {
    display: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 8px 0;
  }
  .section.open .section-body { display: block; }
  .section.open .section-header {
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .check-item {
    padding: 12px 16px;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .check-item:last-child { border-bottom: none; }

  .check-main {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .check-main label {
    flex: 1;
    font-size: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .status-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 18px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .status-btn.ok { border-color: var(--green); background: var(--green); color: #fff; }
  .status-btn.fail { border-color: var(--red); background: var(--red); color: #fff; }
  .status-btn.na { border-color: var(--muted); background: var(--muted); color: #fff; font-size: 11px; font-weight: 700; }

  .check-sides {
    display: flex;
    gap: 6px;
    margin-left: 48px;
  }
  .side-chip {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: #fff;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .side-chip.checked { background: var(--green); color: #fff; border-color: var(--green); }
  .side-chip.fail { background: var(--red); color: #fff; border-color: var(--red); }

  .check-remark {
    margin-left: 48px;
  }
  .check-remark input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    background: var(--bg);
  }
  .check-remark input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .notes-section {
    margin: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .notes-section h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .notes-section textarea {
    width: 100%;
    min-height: 100px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    background: var(--bg);
  }
  .notes-section textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    z-index: 100;
  }
  .bottom-bar button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-reset {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border) !important;
  }
  .btn-pdf {
    background: var(--accent);
    color: #fff;
  }
  .btn-pdf:active { background: #1d4ed8; }

  #printFrame { display: none; }

  .print-page {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    color: #000;
    padding: 10px;
  }
  .print-page h1 { font-size: 18px; margin-bottom: 2px; }
  .print-page .p-sub { font-size: 10px; color: #555; margin-bottom: 8px; }
  .print-page .p-info { margin-bottom: 10px; font-size: 11px; }
  .print-page .p-info b { margin-right: 2px; }
  .print-page .p-info span { margin-right: 18px; }
  .print-page h2 { font-size: 12px; margin: 8px 0 3px; padding-bottom: 2px; border-bottom: 1px solid #999; }
  .print-page table { width: 100%; border-collapse: collapse; margin-bottom: 6px; }
  .print-page th, .print-page td { border: 1px solid #bbb; padding: 3px 5px; text-align: left; font-size: 9px; }
  .print-page th { background: #e8e8e8; font-weight: bold; }
  .print-page .s-ok { color: #16a34a; font-weight: bold; }
  .print-page .s-fail { color: #dc2626; font-weight: bold; }
  .print-page .s-na { color: #888; }
  .print-page .p-notes { margin-top: 8px; padding: 6px; border: 1px solid #bbb; border-radius: 3px; white-space: pre-wrap; font-size: 10px; }
  .print-page .p-summary { margin-top: 8px; padding: 6px; border: 1px solid #bbb; border-radius: 3px; font-size: 10px; }

</style>
</head>
<body>

<header>
  <h1>APK Checklist</h1>
  <p>Personenauto / N1</p>
</header>
<div class="progress-bar"><div class="fill" id="progressFill"></div></div>

<div class="vehicle-info">
  <h2>Voertuiggegevens</h2>
  <div class="field-grid full">
    <div class="field">
      <label>Kenteken</label>
      <div class="kenteken-wrap">
        <div class="kenteken-nl">
          <span class="nl-stars">★★★</span>
          <span class="nl-code">NL</span>
        </div>
        <input type="text" class="kenteken-input" id="v-kenteken" placeholder="XX-000-X" autocapitalize="characters" maxlength="9" oninput="formatKenteken(this); lookupKenteken();">
      </div>
    </div>
  </div>
  <div class="field-grid" style="margin-top:10px">
    <div class="field">
      <label>Meldcode</label>
      <input type="text" id="v-meldcode" placeholder="Meldcode">
    </div>
    <div class="field">
      <label>KM-stand</label>
      <input type="number" id="v-km" placeholder="123456" inputmode="numeric">
    </div>
  </div>
  <div class="field-grid" style="margin-top:10px">
    <div class="field">
      <label>Brandstof</label>
      <select id="v-brandstof">
        <option value="">Kies...</option>
        <option>Benzine</option>
        <option>Diesel</option>
        <option>LPG</option>
        <option>Hybride</option>
        <option>Elektrisch</option>
      </select>
    </div>
    <div class="field">
      <label>Datum</label>
      <input type="date" id="v-datum">
    </div>
  </div>
</div>

<div class="vehicle-card" id="vehicleCard">
  <div id="vehicleCardContent"></div>
</div>

<div class="attention-card" id="attentionCard">
  <h3>⚠ Veelvoorkomende afkeurpunten voor dit model</h3>
  <ul id="attentionList"></ul>
</div>

<div id="checklistContainer"></div>

<div class="notes-section">
  <h3>Opmerkingen / Afkeurpunten</h3>
  <textarea id="generalNotes" placeholder="Aanvullende opmerkingen..."></textarea>
</div>

<div class="apk-verdict" id="apkVerdict"></div>

<div class="summary-bar" id="summaryBar">
  <h3>Samenvatting</h3>
  <div class="summary-counts" id="summaryCounts"></div>
  <div class="summary-alerts" id="summaryAlerts"></div>
</div>

<div class="bottom-bar">
  <button class="btn-reset" onclick="resetAll()">Reset</button>
  <button class="btn-pdf" onclick="exportPDF()">PDF Exporteren</button>
</div>


<script>
const checklistData = [
  {
    title: "Identificatie & registratie",
    items: [
      { text: "Kentekenplaten aanwezig/leesbaar", sides: false },
      { text: "VIN aanwezig/leesbaar", sides: false }
    ]
  },
  {
    title: "Verlichting & elektra",
    items: [
      { text: "Stadslicht", sides: ["R","L"] },
      { text: "Dimlicht", sides: ["R","L"] },
      { text: "Grootlicht", sides: ["R","L"] },
      { text: "Achterlicht", sides: ["R","L"] },
      { text: "Richtingaanwijzers", sides: ["RV","LV","RA","LA"] },
      { text: "Remlichten", sides: ["R","M","L"] },
      { text: "Mistachterlicht aanwezig en werkend", sides: false },
      { text: "Kentekenplaatverlichting/reflectoren", sides: ["R","L"] },
      { text: "Claxon en controlelampjes correct", sides: false }
    ]
  },
  {
    title: "Banden & wielen",
    items: [
      { text: "Profieldiepte \u2265 1,6 mm", sides: ["RV","LV","RA","LA"] },
      { text: "Geen beschadigingen (koord/bobbels)", sides: ["RV","LV","RA","LA"] },
      { text: "Juiste maat/loadindex", sides: ["RV","LV","RA","LA"] },
      { text: "Wielmoeren/bouten vast", sides: ["RV","LV","RA","LA"] },
      { text: "TPMS (bandenspanningscontrolesysteem)", sides: ["RV","LV","RA","LA"] }
    ]
  },
  {
    title: "Remmen",
    items: [
      { text: "Remwerking & balans (testbank)", sides: ["RV","LV","RA","LA"] },
      { text: "Parkeerrem effectief", sides: ["R","L"] },
      { text: "Remleidingen/slangen/slijtage", sides: ["RV","LV","RA","LA"] },
      { text: "Remvloeistof lekkage: geen", sides: ["RV","LV","RA","LA"] },
      { text: "Remvoeringen/-blokken op dikte", sides: ["RV","LV","RA","LA"] },
      { text: "ABS/EBS waarschuwingslampje", sides: false }
    ]
  },
  {
    title: "Stuurinrichting & ophanging",
    items: [
      { text: "Fuseekogel", sides: ["R","L"] },
      { text: "Stuurkogel", sides: ["R","L"] },
      { text: "Draagarm", sides: ["R","L"] },
      { text: "Stabilisatorstang", sides: ["R","L"] },
      { text: "Schokdempers functioneel", sides: ["R","L"] },
      { text: "Veerpoten/veren/subframe in goede staat", sides: ["R","L"] },
      { text: "Wiellagers zonder geluid of speling", sides: ["R","L"] }
    ]
  },
  {
    title: "Carrosserie & veiligheidsgordels",
    items: [
      { text: "Geen gevaarlijke roest/scherpe delen", sides: ["R","L"] },
      { text: "Deuren/motorkap/kofferdeksel sluiten goed", sides: ["R","L"] },
      { text: "Stoelen bevestigd, geen speling", sides: ["R","L"] },
      { text: "Gordels aanwezig en werkend", sides: ["R","L"] }
    ]
  },
  {

  {

  {

  {
    title: "Adviespunten (AC)",
    items: [
      { text: "AC1 — Band(en) met profieldiepte 1,6\u20132,5 mm", sides: false },
      { text: "AC2 — Schokdemper vertoont beginnende lekkage", sides: false },
      { text: "AC3 — Roestschade licht aanwezig", sides: false },
      { text: "AC4 — Stuur- of fuseekogel lichte slijtage (< 1,0 mm)", sides: false },
      { text: "AC5 — Mechanische delen remsysteem lichte slijtage", sides: false }
    ]
  },
  {
    title: "Reparatie-adviezen (RA)",
    items: [
      { text: "RA1 — Waarschuwing airbag-/gordelsysteem defect", sides: false },
      { text: "RA2 — Overmatige vloeistoflekkage", sides: false },
      { text: "RA3 — ESP/ESC defect", sides: false },
      { text: "RA4 — TPMS defect", sides: false },
      { text: "RA5 — Elektronische stuurbekrachtiging defect", sides: false },
      { text: "RA6 — ABS of elektronisch remsysteem defect", sides: false }
    ]
  }
];

// State: itemStates[sectionIdx][itemIdx] = { status: 'none'|'ok'|'fail'|'na', sides: {R:0,M:0,L:0}, remark: '' }
let itemStates = [];

function initState() {
  itemStates = checklistData.map(section =>
    section.items.map(item => ({
      status: 'none',
      sides: item.sides ? Object.fromEntries(item.sides.map(s => [s, 0])) : {},
      remark: ''
    }))
  );
}

function buildChecklist() {
  const container = document.getElementById('checklistContainer');
  container.innerHTML = '';

  checklistData.forEach((section, si) => {
    const div = document.createElement('div');
    div.className = 'section';
    div.id = `section-${si}`;

    div.innerHTML = `
      <div class="section-header" onclick="toggleSection(${si})">
        <h3><span class="num">${si + 1}</span>${section.title}</h3>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="badge pending" id="badge-${si}">0/${section.items.length}</span>
          <span class="arrow">\u25BC</span>
        </div>
      </div>
      <div class="section-body" id="body-${si}">
        ${section.items.map((item, ii) => buildItem(si, ii, item)).join('')}
      </div>
    `;
    container.appendChild(div);
  });
}

function buildItem(si, ii, item) {
  const sidesHtml = item.sides ? `
    <div class="check-sides">
      ${item.sides.map(s => `<span class="side-chip" data-s="${si}" data-i="${ii}" data-side="${s}" onclick="toggleSide(this)">${s}</span>`).join('')}
    </div>
  ` : '';

  return `
    <div class="check-item">
      <div class="check-main">
        <button class="status-btn" id="btn-${si}-${ii}" onclick="cycleStatus(${si},${ii})" title="Tik om status te wijzigen"></button>
        <label onclick="cycleStatus(${si},${ii})">${item.text}</label>
      </div>
      ${sidesHtml}
      <div class="check-remark">
        <input type="text" placeholder="Opmerking..." oninput="itemStates[${si}][${ii}].remark=this.value">
      </div>
    </div>
  `;
}

function cycleStatus(si, ii) {
  const states = ['none', 'ok', 'fail', 'na'];
  const current = itemStates[si][ii].status;
  const next = states[(states.indexOf(current) + 1) % states.length];
  itemStates[si][ii].status = next;

  // Auto-set sides: ok → all green, fail → all red, none/na → reset
  const sides = itemStates[si][ii].sides;
  if (Object.keys(sides).length > 0) {
    const sideVal = next === 'ok' ? 1 : next === 'fail' ? 2 : 0;
    Object.keys(sides).forEach(s => { sides[s] = sideVal; });
    updateSideChips(si, ii);
  }

  updateBtn(si, ii);
  updateBadge(si);
  updateProgress();
  updateSummary();
}

function updateBtn(si, ii) {
  const btn = document.getElementById(`btn-${si}-${ii}`);
  const st = itemStates[si][ii].status;
  btn.className = 'status-btn' + (st !== 'none' ? ' ' + st : '');
  btn.textContent = st === 'ok' ? '\u2713' : st === 'fail' ? '\u2717' : st === 'na' ? 'N/A' : '';
}

function toggleSide(el) {
  const si = +el.dataset.s, ii = +el.dataset.i, side = el.dataset.side;
  const current = itemStates[si][ii].sides[side];
  // 0 = unchecked, 1 = ok, 2 = fail
  const next = (current + 1) % 3;
  itemStates[si][ii].sides[side] = next;
  el.className = 'side-chip' + (next === 1 ? ' checked' : next === 2 ? ' fail' : '');

  // Sync main status from side chips
  const sides = itemStates[si][ii].sides;
  const vals = Object.values(sides);
  if (vals.some(v => v === 2)) {
    itemStates[si][ii].status = 'fail';
  } else if (vals.length > 0 && vals.every(v => v === 1)) {
    itemStates[si][ii].status = 'ok';
  } else if (vals.some(v => v === 1)) {
    itemStates[si][ii].status = 'ok'; // deels ingevuld, maar geen fouten
  } else {
    itemStates[si][ii].status = 'none';
  }
  updateBtn(si, ii);
  updateBadge(si);
  updateProgress();
  updateSummary();
}

function updateSideChips(si, ii) {
  const chips = document.querySelectorAll(`.side-chip[data-s="${si}"][data-i="${ii}"]`);
  chips.forEach(chip => {
    const side = chip.dataset.side;
    const val = itemStates[si][ii].sides[side];
    chip.className = 'side-chip' + (val === 1 ? ' checked' : val === 2 ? ' fail' : '');
  });
}

function updateBadge(si) {
  const badge = document.getElementById(`badge-${si}`);
  const items = itemStates[si];
  const done = items.filter(i => i.status !== 'none').length;
  const hasFail = items.some(i => i.status === 'fail');
  badge.textContent = `${done}/${items.length}`;
  badge.className = 'badge ' + (done === items.length ? (hasFail ? 'issues' : 'done') : 'pending');
}

function updateProgress() {
  // Alleen secties 1-10 tellen voor voortgang
  const acI = checklistData.findIndex(function(s){ return s.title.indexOf('Adviespunten') !== -1; });
  const raI = checklistData.findIndex(function(s){ return s.title.indexOf('Reparatie') !== -1; });
  const mainItems = [];
  itemStates.forEach(function(section, si) {
    if (si === acI || si === raI) return;
    section.forEach(function(item) { mainItems.push(item); });
  });
  const total = mainItems.length;
  const done = mainItems.filter(function(i){ return i.status !== 'none'; }).length;
  document.getElementById('progressFill').style.width = `${(done / total * 100)}%`;
}

function toggleSection(si) {
  document.getElementById(`section-${si}`).classList.toggle('open');
}

// Kenteken formatting
function formatKenteken(el) {
  let val = el.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  // Auto-insert dashes based on NL kenteken patterns
  if (val.length > 6) val = val.substring(0, 6);
  let formatted = val;
  if (val.length >= 4) {
    // Detect pattern and format
    formatted = formatNLKenteken(val);
  }
  el.value = formatted;
}

function formatNLKenteken(raw) {
  // NL kenteken sidecodes: determine groups
  const patterns = [
    /^([A-Z]{2})(\d{3})([A-Z])$/,      // XX-999-X
    /^(\d)([A-Z]{3})(\d{2})$/,          // 9-XXX-99
    /^([A-Z])(\d{3})([A-Z]{2})$/,       // X-999-XX
    /^([A-Z]{2})(\d{3})([A-Z]{2})$/,    // XX-999-XX (old but exists)
    /^(\d{2})([A-Z]{3})(\d)$/,          // 99-XXX-9
    /^(\d{2})([A-Z]{2})(\d{2})$/,       // 99-XX-99
    /^([A-Z]{2})(\d{2})([A-Z]{2})$/,    // XX-99-XX
    /^(\d{2})(\d{2})([A-Z]{2})$/,       // 99-99-XX
    /^([A-Z]{2})(\d{2})(\d{2})$/,       // XX-99-99
    /^(\d{3})([A-Z]{2})(\d)$/,          // 999-XX-9
    /^([A-Z]{3})(\d{2})([A-Z])$/,       // XXX-99-X
  ];
  for (const p of patterns) {
    const m = raw.match(p);
    if (m) return m[1] + '-' + m[2] + '-' + m[3];
  }
  return raw;
}

let lookupTimer = null;
let rdwData = null; // store RDW vehicle data for PDF
function lookupKenteken() {
  clearTimeout(lookupTimer);
  lookupTimer = setTimeout(doLookup, 600);

function doLookup() {
  const raw = document.getElementById('v-kenteken').value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  const card = document.getElementById('vehicleCard');
  const content = document.getElementById('vehicleCardContent');

  if (raw.length < 5) { card.classList.remove('show'); return; }

  card.classList.add('show');
  content.innerHTML = '<div class="vc-loading">Voertuig opzoeken...</div>';

  // RDW OpenData API
  fetch('https://opendata.rdw.nl/resource/m9d7-ebf2.json?kenteken=' + raw)
    .then(r => r.json())
    .then(data => {
      if (!data || data.length === 0) {
        content.innerHTML = '<div class="vc-error">Kenteken niet gevonden</div>';
        rdwData = null;
        return;
      }
      const v = data[0];
      const merk = v.merk || '-';
      const model = v.handelsbenaming || '-';
      const bouwjaar = v.datum_eerste_toelating ? v.datum_eerste_toelating.substring(0,4) : '-';
      const brandstof = v.brandstof_omschrijving || '-';
      const kleur = v.eerste_kleur || '-';
      const apkVervaldatum = v.vervaldatum_apk ?
        v.vervaldatum_apk.substring(6,8) + '-' + v.vervaldatum_apk.substring(4,6) + '-' + v.vervaldatum_apk.substring(0,4) : '-';

      // Datum eerste toelating als volledig getal (YYYYMMDD)
      const det = v.datum_eerste_toelating || '';

      // Save for PDF
      rdwData = { merk: merk, model: model, bouwjaar: bouwjaar, brandstof: brandstof, kleur: kleur, apkVervaldatum: apkVervaldatum, datumEersteToelating: det };

      // Auto-fill brandstof
      const bsSelect = document.getElementById('v-brandstof');
      const bsMap = {'Benzine':'Benzine','Diesel':'Diesel','LPG':'LPG','Elektriciteit':'Elektrisch'};
      const mappedBs = bsMap[brandstof] || '';
      if (mappedBs) {
        for (let i = 0; i < bsSelect.options.length; i++) {
          if (bsSelect.options[i].value === mappedBs) { bsSelect.selectedIndex = i; break; }
        }
      }

      content.innerHTML = '<h3>' + merk + ' ' + model + '</h3>' +
        '<div class="vc-grid">' +
          '<div><div class="vc-label">Bouwjaar</div><div class="vc-val">' + bouwjaar + '</div></div>' +
          '<div><div class="vc-label">Brandstof</div><div class="vc-val">' + brandstof + '</div></div>' +
          '<div><div class="vc-label">Kleur</div><div class="vc-val">' + kleur + '</div></div>' +
          '<div><div class="vc-label">APK vervalt</div><div class="vc-val">' + apkVervaldatum + '</div></div>' +
        '</div>';

      // Also fetch brandstof details
      fetch('https://opendata.rdw.nl/resource/8ys7-d773.json?kenteken=' + raw)
        .then(r2 => r2.json())
        .then(bsData => {
          if (bsData && bsData.length > 0) {
            const bsOmschr = bsData[0].brandstof_omschrijving || '';
            if (bsOmschr) {
              const bsSelect2 = document.getElementById('v-brandstof');
              const bsMap2 = {'Benzine':'Benzine','Diesel':'Diesel','LPG':'LPG','Elektriciteit':'Elektrisch','Waterstof':'Elektrisch'};
              const mapped2 = bsMap2[bsOmschr] || '';
              if (mapped2) {
                for (let j = 0; j < bsSelect2.options.length; j++) {
                  if (bsSelect2.options[j].value === mapped2) { bsSelect2.selectedIndex = j; break; }
                }
              }
            }
          }
        }).catch(function(){});

      // Show common failure points
      showAttentionPoints(merk, model, parseInt(bouwjaar));

      // Blokkeer RA-items voor auto's vanaf 01-01-2018
      applyRABlocking(det);
    })
    .catch(function() {
      content.innerHTML = '<div class="vc-error">Fout bij opzoeken. Controleer je internetverbinding.</div>';
    });
}

// Leeftijdsgerelateerde extra aandachtspunten
function getAgeIssues(bouwjaar) {
  const leeftijd = new Date().getFullYear() - bouwjaar;
  const issues = [];
  if (leeftijd >= 15) issues.push('Roest aan chassis, dorpels en wielkasten (leeftijd > 15 jaar)');
  if (leeftijd >= 12) issues.push('Remleidingen corrosie controleren (leeftijd > 12 jaar)');
  if (leeftijd >= 10) issues.push('Rubbers ophanging/stuurinrichting verharden (leeftijd > 10 jaar)');
  if (leeftijd >= 8) issues.push('Schokdempers lekkage/effectiviteit (leeftijd > 8 jaar)');
  if (leeftijd >= 6) issues.push('Uitlaat ophangpunten en pakking (leeftijd > 6 jaar)');
  return issues;
}

function showAttentionPoints(merk, model, bouwjaar) {
  const card = document.getElementById('attentionCard');
  const list = document.getElementById('attentionList');
  const points = [];

  const merkUpper = (merk || '').toUpperCase().trim();
  const modelUpper = (model || '').toUpperCase().trim();

  console.log('APK aandachtspunten zoeken voor:', merkUpper, modelUpper, bouwjaar);

  // Zoek merk in database (ook partial match, bv. "VOLKSWAGEN" matched ook als RDW "VOLKSWAG" geeft)
  let merkData = null;
  for (const dbMerk in commonFailures) {
    if (merkUpper.indexOf(dbMerk) !== -1 || dbMerk.indexOf(merkUpper) !== -1) {
      merkData = commonFailures[dbMerk];
      console.log('Merk gevonden:', dbMerk);
      break;
    }
  }

  if (merkData) {
    // Zoek model match
    let modelMatch = null;
    if (merkData.models) {
      for (const key in merkData.models) {
        // Flexibele match: "GOLF VII" bevat "GOLF", "CORSA-E" bevat "CORSA", etc.
        if (modelUpper.indexOf(key) !== -1 || key.indexOf(modelUpper) !== -1) {
          modelMatch = key;
          console.log('Model gevonden:', key);
          break;
        }
      }
    }
    // Model-specifieke punten eerst
    if (modelMatch && merkData.models[modelMatch]) {
      merkData.models[modelMatch].forEach(function(p) { points.push(p); });
    }
    // Merk-algemene punten
    if (merkData.all) {
      merkData.all.forEach(function(p) {
        if (points.indexOf(p) === -1) points.push(p);
      });
    }
  }

  // Leeftijdsgerelateerde punten
  if (bouwjaar && !isNaN(bouwjaar) && bouwjaar > 1980) {
    getAgeIssues(bouwjaar).forEach(function(p) {
      if (points.indexOf(p) === -1) points.push(p);
    });
  }

  // Altijd iets tonen: als merk onbekend, toon alleen leeftijdspunten
  if (points.length === 0 && bouwjaar && !isNaN(bouwjaar) && bouwjaar > 1980) {
    const leeftijd = new Date().getFullYear() - bouwjaar;
    if (leeftijd >= 4) {
      points.push('Geen specifieke data voor dit model — controleer standaard slijtpunten extra');
    }
  }

  if (points.length === 0) {
    card.classList.remove('show');
    return;
  }

  list.innerHTML = points.map(function(p) { return '<li>' + p + '</li>'; }).join('');
  card.classList.add('show');

  // Save for PDF
  if (rdwData) rdwData.attentionPoints = points;
}

// Vanaf 01-01-2018 zijn het afkeurpunten en mogen ze NIET als RA genoteerd worden.
const raBlockRules = [
  { raText: 'RA1', reason: 'Airbag/gordelsysteem defect is een afkeurpunt voor voertuigen vanaf 01-01-2018' },
  { raText: 'RA3', reason: 'ESP/ESC defect is een afkeurpunt voor voertuigen vanaf 01-01-2018' },
  { raText: 'RA4', reason: 'TPMS defect is een afkeurpunt voor voertuigen vanaf 01-01-2018' },
  { raText: 'RA5', reason: 'Elektronische stuurbekrachtiging defect is een afkeurpunt voor voertuigen vanaf 01-01-2018' },
  { raText: 'RA6', reason: 'ABS/elektronisch remsysteem defect is een afkeurpunt voor voertuigen vanaf 01-01-2018' },
];

function applyRABlocking(datumEersteToelating) {
  const raIndex = checklistData.findIndex(function(s){ return s.title.indexOf('Reparatie') !== -1; });
  if (raIndex < 0) return;

  // Bepaal of auto vanaf 2018 is
  const isNieuw = datumEersteToelating && parseInt(datumEersteToelating.substring(0,8)) >= 20180101;

  const sectionBody = document.getElementById('body-' + raIndex);
  if (!sectionBody) return;
  const checkItems = sectionBody.querySelectorAll('.check-item');

  checklistData[raIndex].items.forEach(function(item, idx) {
    const checkItem = checkItems[idx];
    if (!checkItem) return;

    // Verwijder eerdere blokkering
    checkItem.classList.remove('blocked');
    const oldMsg = checkItem.querySelector('.blocked-msg');
    if (oldMsg) oldMsg.remove();

    if (isNieuw) {
      // Check of dit RA-item geblokkeerd moet worden
      const rule = raBlockRules.find(function(r) { return item.text.indexOf(r.raText) !== -1; });
      if (rule) {
        checkItem.classList.add('blocked');
        // Reset status als die al was ingevuld
        itemStates[raIndex][idx].status = 'none';
        updateBtn(raIndex, idx);

        const msg = document.createElement('div');
        msg.className = 'blocked-msg';
        msg.textContent = '✗ ' + rule.reason;
        checkItem.appendChild(msg);
      }
    }
  });

  updateBadge(raIndex);
  updateProgress();
  updateSummary();
}

// Summary update
function updateSummary() {
  const bar = document.getElementById('summaryBar');
  const counts = document.getElementById('summaryCounts');
  const alerts = document.getElementById('summaryAlerts');

  const acIndex = checklistData.findIndex(function(s){ return s.title.indexOf('Adviespunten') !== -1; });
  const raIndex = checklistData.findIndex(function(s){ return s.title.indexOf('Reparatie') !== -1; });

  // Alleen secties 1-10 meetellen (niet AC/RA)
  const mainItems = [];
  itemStates.forEach(function(section, si) {
    if (si === acIndex || si === raIndex) return;
    section.forEach(function(item) { mainItems.push(item); });
  });

  const all = itemStates.flat();
  const anyFilled = all.some(function(i){ return i.status !== 'none'; });
  if (!anyFilled) { bar.classList.remove('show'); return; }
  bar.classList.add('show');

  const okC = mainItems.filter(function(i){return i.status==='ok'}).length;
  const failC = mainItems.filter(function(i){return i.status==='fail'}).length;
  const naC = mainItems.filter(function(i){return i.status==='na'}).length;
  const unc = mainItems.length - okC - failC - naC;

  counts.innerHTML = '<span class="sc-ok">' + okC + ' goedgekeurd</span>' +
    '<span class="sc-fail">' + failC + ' afgekeurd</span>' +
    '<span class="sc-na">' + naC + ' n.v.t.</span>' +
    '<span>' + unc + ' open</span>';

  // Afkeurpunten per sectie
  let alertHtml = '';

  // Per sectie afgekeurde items tonen
  checklistData.forEach(function(section, si) {
    if (si === acIndex || si === raIndex) return; // die doen we apart
    const failItems = [];
    itemStates[si].forEach(function(item, idx) {
      if (item.status === 'fail') {
        failItems.push(checklistData[si].items[idx].text);
      }
    });
    if (failItems.length > 0) {
      alertHtml += '<div class="summary-alert danger"><div><strong>✗ ' + (si+1) + '. ' + section.title + ' (' + failItems.length + ')</strong><br>' + failItems.join('<br>') + '</div></div>';
    }
  });

  // Adviespunten
  if (acIndex >= 0) {
    const acChecked = [];
    itemStates[acIndex].forEach(function(item, idx) {
      if (item.status === 'ok' || item.status === 'fail') {
        acChecked.push(checklistData[acIndex].items[idx].text);
      }
    });
    if (acChecked.length > 0) {
      alertHtml += '<div class="summary-alert warn"><div><strong>⚠ Adviespunten (' + acChecked.length + ')</strong><br>' + acChecked.join('<br>') + '</div></div>';
    }
  }

  // Reparatie-adviezen
  if (raIndex >= 0) {
    const raChecked = [];
    itemStates[raIndex].forEach(function(item, idx) {
      if (item.status === 'ok' || item.status === 'fail') {
        raChecked.push(checklistData[raIndex].items[idx].text);
      }
    });
    if (raChecked.length > 0) {
      alertHtml += '<div class="summary-alert danger"><div><strong>🔴 Reparatie-adviezen (' + raChecked.length + ')</strong><br>' + raChecked.join('<br>') + '</div></div>';
    }
  }

  alerts.innerHTML = alertHtml;

  // APK Verdict blok
  const verdict = document.getElementById('apkVerdict');
  const hasRA = (raIndex >= 0) && itemStates[raIndex].some(function(i){ return i.status === 'ok' || i.status === 'fail'; });
  const hasAC = (acIndex >= 0) && itemStates[acIndex].some(function(i){ return i.status === 'ok' || i.status === 'fail'; });
  const hasMainFail = failC > 0;

  if (hasRA || hasMainFail) {
    verdict.className = 'apk-verdict show blocked';
    let reasons = [];
    if (hasMainFail) reasons.push(failC + ' afkeurpunt(en) bij keuring');
    if (hasRA) {
      const raNames = [];
      itemStates[raIndex].forEach(function(item, idx) {
        if (item.status === 'ok' || item.status === 'fail') raNames.push(checklistData[raIndex].items[idx].text);
      });
      reasons.push('Reparatie-advies: ' + raNames.join(', '));
    }
    verdict.innerHTML = '✗ APK AFMELDING ALS GOEDGEKEURD IS NIET MOGELIJK' +
      '<div class="verdict-sub">' + reasons.join('<br>') + '</div>';
  } else if (hasAC) {
    verdict.className = 'apk-verdict show advisory';
    verdict.innerHTML = '⚠ APK GOEDGEKEURD — MET ADVIESPUNTEN' +
      '<div class="verdict-sub">Auto kan worden afgemeld, adviespunten worden genoteerd.</div>';
  } else if (okC > 0 && failC === 0 && unc === 0) {
    verdict.className = 'apk-verdict show passed';
    verdict.innerHTML = '✓ APK GOEDGEKEURD';
  } else {
    verdict.classList.remove('show');
  }
}

function resetAll() {
  if (!confirm('Weet je zeker dat je alles wilt resetten?')) return;
  document.querySelectorAll('.vehicle-info input, .vehicle-info select').forEach(el => el.value = '');
  document.getElementById('generalNotes').value = '';
  document.getElementById('vehicleCard').classList.remove('show');
  document.getElementById('attentionCard').classList.remove('show');
  document.getElementById('summaryBar').classList.remove('show');
  document.getElementById('apkVerdict').classList.remove('show');
  // Verwijder RA-blokkeringen
  document.querySelectorAll('.check-item.blocked').forEach(function(el) {
    el.classList.remove('blocked');
    var msg = el.querySelector('.blocked-msg');
    if (msg) msg.remove();
  });
  rdwData = null;
  initState();
  buildChecklist();
  updateProgress();
}

function exportPDF() {
  const kenteken = document.getElementById('v-kenteken').value || '-';
  const meldcode = document.getElementById('v-meldcode').value || '-';
  const km = document.getElementById('v-km').value || '-';
  const brandstof = document.getElementById('v-brandstof').value || '-';
  const datum = document.getElementById('v-datum').value || new Date().toISOString().slice(0,10);
  const notes = document.getElementById('generalNotes').value;

  let html = '<div class="print-page">';
  html += '<h1>APK Checklist</h1>';
  html += '<div class="p-sub">Personenauto / N1 &mdash; ' + datum + '</div>';
  html += '<div class="p-info">';
  html += '<span><b>Kenteken:</b> ' + kenteken + '</span>';
  html += '<span><b>Meldcode:</b> ' + meldcode + '</span>';
  html += '<span><b>KM-stand:</b> ' + km + '</span>';
  html += '<span><b>Brandstof:</b> ' + brandstof + '</span>';
  html += '</div>';

  // Add RDW vehicle info
  if (rdwData) {
    html += '<div style="padding:8px 10px;background:#f0f0f0;border-radius:4px;font-size:11px;margin-bottom:10px;border:1px solid #ccc">';
    html += '<div style="font-size:14px;font-weight:bold;margin-bottom:4px">' + rdwData.merk + ' ' + rdwData.model + '</div>';
    html += '<span style="margin-right:16px"><b>Bouwjaar:</b> ' + rdwData.bouwjaar + '</span>';
    html += '<span style="margin-right:16px"><b>Brandstof:</b> ' + rdwData.brandstof + '</span>';
    html += '<span style="margin-right:16px"><b>Kleur:</b> ' + rdwData.kleur + '</span>';
    html += '<span style="margin-right:16px"><b>APK vervalt:</b> ' + rdwData.apkVervaldatum + '</span>';
    html += '</div>';

    // Aandachtspunten in PDF
    if (rdwData.attentionPoints && rdwData.attentionPoints.length > 0) {
      html += '<div style="padding:8px 10px;background:#fef9e7;border:2px solid #f59e0b;border-radius:4px;font-size:10px;margin-bottom:10px">';
      html += '<b>⚠ Veelvoorkomende afkeurpunten voor dit model:</b><ul style="margin:4px 0 0 16px;padding:0">';
      rdwData.attentionPoints.forEach(function(p) {
        html += '<li>' + p + '</li>';
      });
      html += '</ul></div>';
    }
  }

  checklistData.forEach(function(section, si) {
    var hasSides = section.items.some(function(i) { return i.sides; });
    html += '<h2>' + (si+1) + '. ' + section.title + '</h2>';
    html += '<table><tr><th style="width:40px">Status</th><th>Controlepunt</th>';
    if (hasSides) html += '<th style="width:80px">Zijde</th>';
    html += '<th>Opmerking</th></tr>';

    section.items.forEach(function(item, ii) {
      var state = itemStates[si][ii];
      var statusTxt = state.status === 'ok' ? '<span class="s-ok">OK</span>'
        : state.status === 'fail' ? '<span class="s-fail">FOUT</span>'
        : state.status === 'na' ? '<span class="s-na">N/A</span>' : '-';

      var sidesStr = '';
      if (item.sides) {
        sidesStr = item.sides.map(function(s) {
          var v = state.sides[s];
          return v === 1 ? '<span class="s-ok">' + s + '</span>' : v === 2 ? '<span class="s-fail">' + s + '</span>' : s + ':-';
        }).join(' &nbsp;');
      }

      html += '<tr><td style="text-align:center">' + statusTxt + '</td><td>' + item.text + '</td>';
      if (hasSides) html += '<td style="font-size:8px">' + sidesStr + '</td>';
      html += '<td>' + (state.remark || '') + '</td></tr>';
    });
    html += '</table>';
  });

  if (notes) {
    html += '<h2>Opmerkingen / Afkeurpunten</h2>';
    html += '<div class="p-notes">' + notes.replace(/\n/g, '<br>') + '</div>';
  }

  // Alleen secties 1-10 meetellen (niet AC/RA)
  var acIdx = checklistData.findIndex(function(s){ return s.title.indexOf('Adviespunten') !== -1; });
  var raIdx = checklistData.findIndex(function(s){ return s.title.indexOf('Reparatie') !== -1; });
  var mainPdf = [];
  itemStates.forEach(function(section, si) {
    if (si === acIdx || si === raIdx) return;
    section.forEach(function(item) { mainPdf.push(item); });
  });
  var okC = mainPdf.filter(function(i){return i.status==='ok'}).length;
  var failC = mainPdf.filter(function(i){return i.status==='fail'}).length;
  var naC = mainPdf.filter(function(i){return i.status==='na'}).length;
  var unc = mainPdf.length - okC - failC - naC;

  html += '<div class="p-summary"><b>Samenvatting:</b> ' + okC + ' goedgekeurd &middot; ' + failC + ' afgekeurd &middot; ' + naC + ' n.v.t. &middot; ' + unc + ' niet ingevuld</div>';

  // Afkeurpunten per sectie in PDF
  checklistData.forEach(function(section, si) {
    if (si === acIdx || si === raIdx) return;
    var failItems = [];
    itemStates[si].forEach(function(item, idx) {
      if (item.status === 'fail') failItems.push(checklistData[si].items[idx].text);
    });
    if (failItems.length > 0) {
      html += '<div style="margin-top:6px;padding:6px;border:2px solid #ef4444;border-radius:3px;background:#fef2f2;font-size:10px"><b>✗ ' + (si+1) + '. ' + section.title + ' (' + failItems.length + '):</b><br>' + failItems.join('<br>') + '</div>';
    }
  });

  if (acIdx >= 0) {
    var acList = [];
    itemStates[acIdx].forEach(function(item, idx) {
      if (item.status === 'ok' || item.status === 'fail') acList.push(checklistData[acIdx].items[idx].text);
    });
    if (acList.length > 0) {
      html += '<div style="margin-top:6px;padding:6px;border:2px solid #f59e0b;border-radius:3px;background:#fef9e7;font-size:10px"><b>⚠ Adviespunten (' + acList.length + '):</b><br>' + acList.join('<br>') + '</div>';
    }
  }
  if (raIdx >= 0) {
    var raList = [];
    itemStates[raIdx].forEach(function(item, idx) {
      if (item.status === 'ok' || item.status === 'fail') raList.push(checklistData[raIdx].items[idx].text);
    });
    if (raList.length > 0) {
      html += '<div style="margin-top:6px;padding:6px;border:2px solid #ef4444;border-radius:3px;background:#fef2f2;font-size:10px"><b>🔴 Reparatie-adviezen (' + raList.length + '):</b><br>' + raList.join('<br>') + '</div>';
    }
  }

  // APK Verdict in PDF
  var pdfHasRA = (raIdx >= 0) && itemStates[raIdx].some(function(i){ return i.status === 'ok' || i.status === 'fail'; });
  var pdfHasAC = (acIdx >= 0) && itemStates[acIdx].some(function(i){ return i.status === 'ok' || i.status === 'fail'; });
  if (pdfHasRA || failC > 0) {
    html += '<div style="margin-top:10px;padding:10px;border:3px solid #dc2626;border-radius:4px;background:#fee2e2;text-align:center;font-size:14px;font-weight:bold;color:#991b1b">✗ APK AFMELDING ALS GOEDGEKEURD IS NIET MOGELIJK</div>';
  } else if (pdfHasAC) {
    html += '<div style="margin-top:10px;padding:10px;border:3px solid #f59e0b;border-radius:4px;background:#fef3c7;text-align:center;font-size:14px;font-weight:bold;color:#92400e">⚠ APK GOEDGEKEURD — MET ADVIESPUNTEN</div>';
  } else if (okC > 0 && failC === 0 && unc === 0) {
    html += '<div style="margin-top:10px;padding:10px;border:3px solid #16a34a;border-radius:4px;background:#dcfce7;text-align:center;font-size:14px;font-weight:bold;color:#166534">✓ APK GOEDGEKEURD</div>';
  }

  html += '</div>';

  // Open print window
  var win = window.open('', '_blank');
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>APK ' + kenteken + ' ' + datum + '</title>');
  win.document.write('<style>');
  win.document.write('body{margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#000}');
  win.document.write('.print-page{padding:15mm 12mm;max-width:210mm}');
  win.document.write('h1{font-size:18px;margin:0 0 2px}');
  win.document.write('.p-sub{font-size:10px;color:#555;margin-bottom:8px}');
  win.document.write('.p-info{margin-bottom:10px}.p-info span{margin-right:18px}.p-info b{margin-right:2px}');
  win.document.write('h2{font-size:12px;margin:10px 0 3px;padding-bottom:2px;border-bottom:1px solid #999}');
  win.document.write('table{width:100%;border-collapse:collapse;margin-bottom:6px}');
  win.document.write('th,td{border:1px solid #bbb;padding:3px 5px;text-align:left;font-size:9px}');
  win.document.write('th{background:#e8e8e8;font-weight:bold}');
  win.document.write('.s-ok{color:#16a34a;font-weight:bold}');
  win.document.write('.s-fail{color:#dc2626;font-weight:bold}');
  win.document.write('.s-na{color:#888}');
  win.document.write('.p-notes{margin-top:6px;padding:6px;border:1px solid #bbb;border-radius:3px;white-space:pre-wrap;font-size:10px}');
  win.document.write('.p-summary{margin-top:8px;padding:6px;border:1px solid #bbb;border-radius:3px;font-size:10px}');
  win.document.write('@media print{body{margin:0}@page{size:A4;margin:10mm}}');
  win.document.write('</style></head><body>');
  win.document.write(html);
  win.document.write('</body></html>');
  win.document.close();
  setTimeout(function(){ win.print(); }, 400);
}

document.getElementById('v-datum').value = new Date().toISOString().slice(0, 10);
initState();
buildChecklist();
</script>
